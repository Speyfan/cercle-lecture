services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data
    networks:
      - internal
    depends_on: []

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      - app

  # Cron : newsletter mensuelle (1er du mois 08h00) + sauvegarde SQLite quotidienne (03h00).
  cron:
    build: ./cron
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data # accès à app.db + écriture des sauvegardes dans ./data/backups
    networks:
      - internal
    depends_on:
      - app

networks:
  internal:

volumes:
  caddy_data:
  caddy_config:
